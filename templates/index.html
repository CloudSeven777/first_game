<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Камень, ножницы, бумага</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 50px; }
        .choices button { margin: 10px; padding: 15px 30px; font-size: 18px; }
        #result { margin-top: 20px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
<h1>Камень, ножницы, бумага</h1>

<div class="choices">
    <button onclick="makeChoice('камень')">
        <img src="{{url_for('static', filename='free-icon-rocks-1867550.png')}}" width="50" height="50"></button>
    <button onclick="makeChoice('ножницы')">
        <img src="{{url_for('static', filename='free-icon-scissors-4301274.png')}}" width="50" height="50"></button>
    <button onclick="makeChoice('бумага')">
        <img src="{{url_for('static', filename='free-icon-paper-4334402.png')}}" width="50" height="50"></button>
</div>

<div id="result">Сделайте выбор!</div>

<script>
    async function makeChoice(choice) {
        const response = await fetch('/play', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ choice: choice })
        });
        const data = await response.json();
        document.getElementById('result').innerHTML = `
            Ваш выбор: ${data.user_choice}<br>
            Выбор компьютера: ${data.computer_choice}<br>
            ${data.result}
        `;
    }
</script>
</body>
</html>
